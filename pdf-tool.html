<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image to PDF Converter</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load jsPDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <header>
        <h1>Image to PDF</h1>
        <a href="index.html" style="color:white">← Back to Home</a>
    </header>

    <div class="container" style="text-align: center;">
        <div class="card">
            <p>Select images to convert into a single PDF</p>
            <input type="file" id="pdf-upload" accept="image/*">
            <br>
            <button id="convert-btn" class="btn">Convert & Download PDF</button>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;

        document.getElementById('convert-btn').addEventListener('click', () => {
            const fileInput = document.getElementById('pdf-upload');
            if (fileInput.files.length === 0) return alert('Please select an image');

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const pdf = new jsPDF();
                    const imgProps = pdf.getImageProperties(e.target.result);
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                    
                    pdf.addImage(e.target.result, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                    pdf.save("converted.pdf");
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
