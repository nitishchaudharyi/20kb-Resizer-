<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaTool Hub - 50+ Free Online Tools</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

<header>
    <h1>MegaTool Hub</h1>
    <p>Fast, Secure, and Private Web Utilities</p>
    <div class="search-container">
        <input type="text" id="toolSearch" placeholder="Search 50+ tools (e.g. PDF, Resize, Case)..." onkeyup="filterTools()">
    </div>
</header>

<nav class="categories">
    <button class="cat-btn active" onclick="filterCat('all')">All</button>
    <button class="cat-btn" onclick="filterCat('image')">Images</button>
    <button class="cat-btn" onclick="filterCat('text')">Text</button>
    <button class="cat-btn" onclick="filterCat('pdf')">PDF</button>
    <button class="cat-btn" onclick="filterCat('dev')">Development</button>
</nav>

<div class="container">
    <div id="toolGrid" class="tool-grid">
        <!-- Tools will be injected here by JavaScript -->
    </div>
</div>

<script>
    // THE LIST OF 50 TOOLS
    const tools = [
        { name: "20KB Resizer", cat: "image", desc: "Compress image under 20KB", link: "resizer.html?size=20" },
        { name: "50KB Resizer", cat: "image", desc: "Compress image under 50KB", link: "resizer.html?size=50" },
        { name: "100KB Resizer", cat: "image", desc: "Compress image under 100KB", link: "resizer.html?size=100" },
        { name: "Image to PDF", cat: "pdf", desc: "Convert JPG/PNG to PDF document", link: "pdf-tool.html" },
        { name: "PDF to Image", cat: "pdf", desc: "Extract pages from PDF to JPG", link: "#" },
        { name: "Merge PDF", cat: "pdf", desc: "Combine multiple PDFs into one", link: "#" },
        { name: "Upper Case Converter", cat: "text", desc: "CONVERT TEXT TO ALL CAPS", link: "text-tools.html?type=upper" },
        { name: "Lower Case Converter", cat: "text", desc: "convert text to small letters", link: "text-tools.html?type=lower" },
        { name: "Word Counter", cat: "text", desc: "Count words and characters", link: "text-tools.html?type=count" },
        { name: "Remove Extra Spaces", cat: "text", desc: "Clean up messy text spacing", link: "text-tools.html?type=clean" },
        { name: "JSON Formatter", cat: "dev", desc: "Make JSON code readable", link: "#" },
        { name: "Base64 Encoder", cat: "dev", desc: "Convert text to Base64 string", link: "#" },
        { name: "MD5 Hash Generator", cat: "dev", desc: "Generate secure MD5 hashes", link: "#" },
        { name: "QR Code Generator", cat: "image", desc: "Create QR codes for links", link: "#" },
        { name: "Password Generator", cat: "dev", desc: "Create strong random passwords", link: "#" },
        { name: "BMI Calculator", cat: "dev", desc: "Calculate Body Mass Index", link: "#" },
        { name: "Age Calculator", cat: "dev", desc: "Calculate exact age in years/days", link: "#" },
        { name: "Image Cropper", cat: "image", desc: "Crop images to specific ratios", link: "#" },
        { name: "JPG to PNG", cat: "image", desc: "Convert image formats", link: "#" },
        { name: "PNG to JPG", cat: "image", desc: "Convert image formats", link: "#" },
        // ... Add more tools here until you reach 50
    ];

    function displayTools(data) {
        const grid = document.getElementById('toolGrid');
        grid.innerHTML = data.map(tool => `
            <div class="card" data-cat="${tool.cat}">
                <h3>${tool.name}</h3>
                <p>${tool.desc}</p>
                <a href="${tool.link}" class="btn">Open Tool</a>
            </div>
        `).join('');
    }

    function filterTools() {
        const query = document.getElementById('toolSearch').value.toLowerCase();
        const filtered = tools.filter(t => t.name.toLowerCase().includes(query) || t.desc.toLowerCase().includes(query));
        displayTools(filtered);
    }

    function filterCat(category) {
        // Update button states
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        if(category === 'all') {
            displayTools(tools);
        } else {
            const filtered = tools.filter(t => t.cat === category);
            displayTools(filtered);
        }
    }

    // Initialize
    displayTools(tools);
</script>

</body>
</html>
